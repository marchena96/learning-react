<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima - Consultar API</title>
    <link rel="stylesheet" href="css/tailwind.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-800">

    <div class="container mx-auto py-12">
        <h1 class="text-4xl text-white font-black text-center mb-10">Buscador de Clima</h1>

        <div class="max-w-lg mx-auto bg-white p-10 rounded-lg shadow-lg">
            <form id="form" action="#" method="POST">
                <div class="mb-5">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="ciudad">Ciudad</label>
                    <input
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                        id="ciudad" type="text" placeholder="Ej. San José o Nicoya">
                </div>
                <div class="mb-5">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="pais">País</label>
                    <select
                        class="block appearance-none w-full bg-gray-200 border border-gray-200 text-gray-700 py-3 px-4 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-gray-500"
                        id="pais">
                        <option value="" disabled selected>-- Seleccione --</option>
                    </select>
                </div>

                <input type="submit"
                    class="bg-yellow-500 hover:bg-yellow-600 w-full p-3 text-white uppercase font-bold cursor-pointer transition-colors duration-300"
                    value="Obtener Clima">
            </form>
        </div>

        <div id="resultado" class="mt-10"></div>
    </div>

    <script src="js/app.js" type="module"></script>
</body>

</html>
